services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodle
    volumes:
      - dbdata:/var/lib/mysql

  moodle:
    image: erseco/alpine-moodle:v5.0.5
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "80:8080"
    environment:
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_NAME: moodle
      DB_USER: moodle
      DB_PASS: moodle
      DB_PORT: 3306
      DB_PREFIX: mdl_
      DEBUG: "true"
      MOODLE_EMAIL: admin@example.com
      MOODLE_LANGUAGE: es
      MOODLE_SITENAME: Moodle-eXeLearning
      MOODLE_USERNAME: admin@example.com
      MOODLE_PASSWORD: PLEASE_CHANGEME
      PRE_CONFIGURE_COMMANDS: |
        echo 'This is a pre-configure command'
      POST_CONFIGURE_COMMANDS: |
        echo '== Running Moodle upgrade =='
        php admin/cli/upgrade.php --non-interactive
    volumes:
      - moodledata:/var/moodledata
      # Mount the plugin inside the Moodle content bank content type directory.
      - .:/var/www/html/contentbank/contenttype/exelearning

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M

  # The alpine-chromedriver image includes Chrome + Chromedriver for Behat.
  chrome:
    image: ghcr.io/erseco/alpine-chromedriver:latest
    container_name: chrome
    hostname: chrome
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "9515:9515"

volumes:
  moodledata:
  dbdata:
